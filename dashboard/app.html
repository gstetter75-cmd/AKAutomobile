<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AK Automobile — Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="app-main">
      <header class="app-header" id="appHeader">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
        <div class="app-header-title" id="headerTitle">Dashboard</div>
        <a href="../index.html" target="_blank" class="app-header-website-btn" title="Website-Vorschau">🔗 Website</a>
        <div class="app-header-user" id="headerUser"></div>
      </header>
      <div class="app-content" id="appContent">
        <div class="loading-spinner"></div>
      </div>
    </main>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- jsPDF for PDF exports -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- Config & Core -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>

  <!-- Components -->
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>

  <!-- Modules -->
  <script src="js/modules/dashboard-home.js"></script>
  <script src="js/modules/vehicles-list.js"></script>
  <script src="js/modules/vehicles-form.js"></script>
  <script src="js/modules/customers-list.js"></script>
  <script src="js/modules/customers-form.js"></script>
  <script src="js/modules/inquiries-list.js"></script>
  <script src="js/modules/finance-list.js"></script>
  <script src="js/modules/finance-form.js"></script>
  <script src="js/modules/appointments-list.js"></script>
  <script src="js/modules/appointments-form.js"></script>
  <script src="js/modules/documents-list.js"></script>
  <script src="js/modules/exports.js"></script>
  <script src="js/modules/portals.js"></script>
  <script src="js/modules/settings.js"></script>

  <!-- App Init -->
  <script>
    (async function initApp() {
      const session = await requireAuth();
      if (!session) return;

      renderSidebar(document.getElementById('sidebar'));

      document.getElementById('sidebarToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });

      const user = await getUser();
      document.getElementById('headerUser').textContent = user?.email || '';

      // Register all routes
      router.register('/dashboard', renderDashboardHome);
      router.register('/vehicles', renderVehiclesList);
      router.register('/vehicles/new', (c) => renderVehicleForm(c, null));
      router.register('/customers', renderCustomersList);
      router.register('/customers/new', (c) => renderCustomerForm(c, null));
      router.register('/inquiries', renderInquiriesList);
      router.register('/finance', renderFinanceList);
      router.register('/finance/new', (c) => renderFinanceForm(c, null));
      router.register('/documents', renderDocumentsList);
      router.register('/appointments', renderAppointmentsList);
      router.register('/appointments/new', renderAppointmentForm);
      router.register('/exports', renderExportsPage);
      router.register('/portals', renderPortalsPage);
      router.register('/settings', renderSettings);

      // Dynamic edit routes
      const origHandle = router.handleRoute.bind(router);
      router.handleRoute = async function() {
        const hash = window.location.hash.slice(1) || '/dashboard';
        const content = document.getElementById('appContent');

        // Match /vehicles/edit/:id
        const vehicleEdit = hash.match(/^\/vehicles\/edit\/(.+)$/);
        if (vehicleEdit) {
          content.innerHTML = '<div class="loading-spinner"></div>';
          document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#/vehicles'));
          await renderVehicleForm(content, vehicleEdit[1]);
          return;
        }

        // Match /customers/edit/:id
        const customerEdit = hash.match(/^\/customers\/edit\/(.+)$/);
        if (customerEdit) {
          content.innerHTML = '<div class="loading-spinner"></div>';
          document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#/customers'));
          await renderCustomerForm(content, customerEdit[1]);
          return;
        }

        // Match /finance/edit/:id
        const financeEdit = hash.match(/^\/finance\/edit\/(.+)$/);
        if (financeEdit) {
          content.innerHTML = '<div class="loading-spinner"></div>';
          document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#/finance'));
          await renderFinanceForm(content, financeEdit[1]);
          return;
        }

        await origHandle();
      };

      router.init();
    })();
  </script>
</body>
</html>
