<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AK Automobile — Dashboard Login</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="favicon-admin.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="../favicon.svg" alt="" width="48" height="48">
        <h1>AK Automobile</h1>
        <p>Dashboard-Anmeldung</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-Mail</label>
          <input type="email" id="email" class="form-input" required placeholder="ihre@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Passwort</label>
          <input type="password" id="password" class="form-input" required placeholder="Passwort" autocomplete="current-password">
        </div>
        <div id="loginError" class="login-error" style="display: none;"></div>
        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">Anmelden</button>
      </form>
      <div class="login-footer">
        <a href="../index.html">&larr; Zurück zur Website</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already logged in, redirect
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'app.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Wird angemeldet...';

      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'app.html';
      } catch (err) {
        errorEl.textContent = 'Anmeldung fehlgeschlagen. Bitte E-Mail und Passwort prüfen.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    });
  </script>
</body>
</html>
